name: Daily News Briefing

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

# 1. GitHub 시스템 액션 버전을 Node 24로 강제 승급 (경고 메시지 해결)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4
    
    - name: Node.js 설치하기
      uses: actions/setup-node@v4
      with:
        node-version: '24'  # 2. 우리가 사용할 버전을 20에서 24로 변경
        
    - name: 라이브러리 설치 (npm install)
      run: npm install
      
    - name: 메인 스크립트 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_APP_PASS: ${{ secrets.EMAIL_APP_PASS }}
        COMPANY_EMAIL: ${{ secrets.COMPANY_EMAIL }}
      run: node index.js
